<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte en Vivo - Paneldecliente</title>
    <style>
        /* Diseño limpio y profesional */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #1f93ff; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; font-size: 16px; line-height: 1.5; }
        span { font-weight: bold; color: #000; }
        .loader {
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1f93ff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>¡Hola, <span id="nombre-usuario">...</span>!</h1>
        <p>Estamos conectándote con un asesor de <strong>Paneldecliente</strong>.</p>
        <div class="loader"></div>
        <p style="font-size: 13px; color: #999;">Registrado como: <span id="email-usuario">...</span></p>
    </div>

    <!-- 1. CONFIGURACIÓN Y SCRIPT DE TU CHATWOOT -->
    <script>
      window.chatwootSettings = {
        "position": "right",
        "type": "standard",
        "launcherTitle": "",
        "showPopoutButton": false
      };

      (function(d,t) {
        var BASE_URL="https://chat.altomarketing.com.ar";
        var g=d.createElement(t),s=d.getElementsByTagName(t)[0];
        g.src=BASE_URL+"/packs/js/sdk.js";
        g.async = true;
        s.parentNode.insertBefore(g,s);
        g.onload=function(){
          window.chatwootSDK.run({
            websiteToken: 'yLU3kHCmDnuaHJZTJVH7Gyck',
            baseUrl: BASE_URL
          })
        }
      })(document,"script");
    </script>

    <!-- 2. CAPTURA DE VARIABLES Y ENVÍO A CHATWOOT -->
    <script>
        // Leemos la URL apenas carga la página
        const urlParams = new URLSearchParams(window.location.search);
        const nombre = urlParams.get('nombre') || 'Cliente';
        const email = urlParams.get('email');
        const telefono = urlParams.get('telefono');
        const mensajePredefinido = urlParams.get('mensaje');

        // Imprimimos visualmente en el HTML
        document.getElementById('nombre-usuario').textContent = nombre;
        document.getElementById('email-usuario').textContent = email || 'Invitado';

        // --- Helper: busca el textarea/contenteditable dentro del iframe de Chatwoot ---
        function buscarCampoDeTexto() {
            // Chatwoot puede usar distintos selectores de iframe según versión.
            const iframe = document.querySelector('iframe.woot-widget-bubble')
                         || document.querySelector('iframe[title="chatwoot-widget"]')
                         || document.querySelector('.woot-widget-holder iframe')
                         || document.querySelector('iframe[id^="chatwoot"]');

            if (!iframe) return null;

            let innerDoc;
            try {
                innerDoc = iframe.contentDocument || iframe.contentWindow.document;
            } catch (e) {
                console.warn('No se pudo acceder al iframe de Chatwoot:', e);
                return null;
            }

            // Buscamos el textarea clásico o, si usan un div editable, el contenteditable
            return innerDoc.querySelector('textarea.input')
                || innerDoc.querySelector('textarea')
                || innerDoc.querySelector('[contenteditable="true"]');
        }

        // --- Helper: escribe el texto simulando un input real (para que React/Vue lo detecte) ---
        function escribirMensaje(campo, texto) {
            campo.focus();

            if (campo.tagName.toLowerCase() === 'textarea') {
                const nativeInputValueSetter = Object.getOwnPropertyDescriptor(
                    window.HTMLTextAreaElement.prototype, 'value'
                ).set;
                nativeInputValueSetter.call(campo, texto);
            } else {
                // contenteditable
                campo.textContent = texto;
            }

            campo.dispatchEvent(new Event('input', { bubbles: true }));
            campo.dispatchEvent(new Event('change', { bubbles: true }));
        }

        // --- Intenta escribir el mensaje, reintentando si el iframe todavía no montó el campo ---
        function intentarEscribirMensaje(intentos) {
            if (!mensajePredefinido) return;

            const campo = buscarCampoDeTexto();

            if (campo) {
                escribirMensaje(campo, mensajePredefinido);
                console.log('Mensaje predefinido cargado en el campo de texto.');
                return;
            }

            if (intentos > 0) {
                setTimeout(() => intentarEscribirMensaje(intentos - 1), 400);
            } else {
                console.warn('No se encontró el campo de texto del widget tras varios intentos. Puede que Chatwoot haya cambiado su estructura interna.');
            }
        }

        // Cuando Chatwoot esté listo, le inyectamos los datos e iniciamos el chat
        window.addEventListener("chatwoot:ready", function () {
            // 1. Enviamos todas las variables de identificación del usuario
            if (email) {
                window.$chatwoot.setUser(email, {
                    email: email,
                    name: nombre,
                    phone_number: telefono ? telefono : undefined
                });
            }

            // 2. Abrimos el chat de forma automática
            setTimeout(() => {
                window.$chatwoot.toggle("open");

                // 3. Intentamos escribir el mensaje predefinido en el campo de texto
                //    (reintenta hasta 10 veces, cada 400ms, por si el iframe tarda en montar el input)
                intentarEscribirMensaje(10);
            }, 500);
        });
    </script>
</body>
</html>
